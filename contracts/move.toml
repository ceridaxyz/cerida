[package]
name = "cerida"
edition = "2024.beta"
version = "0.0.1"

[dependencies]
# Sui, Bridge, MoveStdlib and SuiSystem are imported implicitly (Sui 1.45+).
# DeepBook Predict is referenced by local path: the pushed workshop branch on
# GitHub is out of sync with the local clone (macro vs fn skew), so the local
# checkout is the only internally-consistent source. Switch to a git dep once
# a coherent rev is published.
deepbook_predict = { local = "../../../clones/deepbookv3-testnet-4-16/packages/predict" }

[addresses]
cerida = "0x0"

# Matches Predict's pinned localnet chain-id so per-environment published
# addresses resolve via Move.lock when deploying to the local Docker network.

