# Cerida local Predict environment — Sui localnet only.
#
# This runs ONLY a Sui localnet node (RPC :9000, faucet :9123). All publishing,
# Predict setup, and Cerida flow simulation is done by host scripts (see
# scripts/) using the host's `sui 1.73` binary + the TS SDK against this node.
# Keeping the build toolchain on the host avoids baking it into the image.
#
# Usage:
#   docker compose up -d            # start the localnet
#   docker compose logs -f          # watch it
#   docker compose down -v          # stop + wipe (fresh genesis next time)
#
# The node writes its deployer keystore to ./deployments/.sui-keystore so the
# host scripts can import the funded genesis account.

networks:
  cerida-net:
    driver: bridge

volumes:
  sui_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      # Cap the in-memory store so a long-running localnet can't balloon
      # unbounded (RAM -> Docker VM disk) and starve the host disk.
      o: size=3g
  timescale_data:
  redis_data:

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: cerida-timescaledb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cerida}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - cerida-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-cerida}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cerida-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cerida-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  sui-localnet:
    # Must be a sui-tools image new enough to run predict-testnet-4-16's
    # [environments] manifest format (>= ~1.65). Default targets 1.73.1.
    # If the pull fails, set SUI_TOOLS_IMAGE in .env to a tag that exists for
    # your arch (see https://hub.docker.com/r/mysten/sui-tools/tags).
    image: ${SUI_TOOLS_IMAGE:-mysten/sui-tools:testnet-v1.73.1-arm64}
    container_name: cerida-sui-localnet
    environment:
      FORCE_REGENESIS: ${FORCE_REGENESIS:-true}
    command: >
      sh -c '
        rm -rf /root/.sui/sui_config;
        export RUST_LOG="off,sui_node=info";
        sui start --with-faucet --force-regenesis &
        SUI_PID=$$!;
        until [ -f /root/.sui/sui_config/sui.keystore ]; do sleep 1; done;
        cp /root/.sui/sui_config/sui.keystore /shared/.sui-keystore;
        chmod 644 /shared/.sui-keystore;
        wait $$SUI_PID
      '
    ports:
      - "9000:9000" # JSON-RPC
      - "9123:9123" # faucet
    volumes:
      - sui_data:/root/.sui
      - ./deployments:/shared
    networks:
      - cerida-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped
    # Bound Docker's capture of the node's stdout. Without this, a long-running
    # localnet's sui_node=info stream grows the json-file log unbounded into the
    # Docker VM disk until the host disk fills and the node silently degrades
    # (RPC -32603) while the port-only healthcheck still reports "healthy".
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cerida-api:
    build:
      context: ..
      dockerfile: crates/Dockerfile
    container_name: cerida-api
    command: ["cerida-api"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@timescaledb:5432/cerida}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PREDICT_BASE: ${PREDICT_BASE:-https://predict-server.testnet.mystenlabs.com}
      SUI_RPC_URL: ${SUI_RPC_URL:-http://sui-localnet:9000}
      CERIDA_PACKAGE_ID: ${CERIDA_PACKAGE_ID:-}
      API_HOST: 0.0.0.0
      API_PORT: 8788
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "8788:8788"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cerida-net
    restart: unless-stopped

  cerida-indexer:
    build:
      context: ..
      dockerfile: crates/Dockerfile
    container_name: cerida-indexer
    command: ["cerida-indexer"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@timescaledb:5432/cerida}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PREDICT_BASE: ${PREDICT_BASE:-https://predict-server.testnet.mystenlabs.com}
      SUI_RPC_URL: ${SUI_RPC_URL:-http://sui-localnet:9000}
      CERIDA_PACKAGE_ID: ${CERIDA_PACKAGE_ID:-}
      POLL_MS: ${POLL_MS:-3000}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      sui-localnet:
        condition: service_healthy
    networks:
      - cerida-net
    restart: unless-stopped

  cerida-keeper:
    build:
      context: ..
      dockerfile: crates/Dockerfile
    container_name: cerida-keeper
    command: ["cerida-keeper"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@timescaledb:5432/cerida}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SUI_RPC_URL: ${SUI_RPC_URL:-http://sui-localnet:9000}
      KEEPER_DRY_RUN: ${KEEPER_DRY_RUN:-true}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      sui-localnet:
        condition: service_healthy
    networks:
      - cerida-net
    restart: unless-stopped
